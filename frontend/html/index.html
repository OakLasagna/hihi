<!DOCTYPE html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Főoldal</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/index.css" />
        <!--!JavaScript-->
        <script src="../javascript/index.js"></script>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row text-center">
                <h1 class="display-1">A szerver fut.</h1>
                <form id ="carForm" class="col-4 offset-4 mt-5">
                    <input type="text"name="brand" placeholder="Márka" class="form-control mb-2" id="brand" />
                    <input type="text" name="model" placeholder="Modell" class="form-control mb-2" id="model" />
                    <input type="text" name="color" placeholder="Szín" class="form-control mb-2" id="color" />
                    <input type="number" name="year" placeholder="Évjárat" class="form-control mb-2" id="year" />
                    <input type="text" name="fuelType" placeholder="Üzemanyag típus" class="form-control mb-2" id="fuelType" />
                    <button type="button" class="btn btn-primary" id="uploadButton">Autó feltöltése</button>
                </form>
            </div>
        </div>
    </body>
</html>
